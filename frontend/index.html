<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Reminder Dashboard</title>
    <!-- Telegram Web App script -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app" class="container">
        <header>
            <div class="user-info">
                <img id="user-avatar" src="https://via.placeholder.com/50" alt="Avatar">
                <div class="user-text">
                    <h2>Welcome, <span id="username">Student</span>!</h2>
                    <p>Manage your daily study sessions</p>
                </div>
            </div>
        </header>

        <main>
            <div class="card add-task-card">
                <h3>Add New Reminder</h3>
                <form id="add-task-form">
                    <div class="input-group">
                        <label for="task-title">Subject / Task</label>
                        <input type="text" id="task-title" placeholder="e.g., Math Chapter 5" required>
                    </div>
                    <div class="input-group">
                        <label for="task-time">Time (HH:MM)</label>
                        <input type="time" id="task-time" required>
                    </div>
                    <button type="submit" class="btn-primary" id="submit-btn" disabled>Add Task</button>
                    <div id="status-message" class="status hidden"></div>
                </form>
            </div>
            
            <div class="card list-task-card">
                <h3>Your Active Reminders</h3>
                <ul id="task-list" class="task-list">
                    <!-- Tasks will be injected here -->
                    <li class="empty-state">No reminders set. Start adding!</li>
                </ul>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
